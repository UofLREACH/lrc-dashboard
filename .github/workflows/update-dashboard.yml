name: Update Dashboard

on:
  push:
    paths:
      - 'data/*.csv'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed CSV
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'data/*.csv' | head -1)
          if [ -z "$CHANGED" ]; then
            CHANGED=$(git show --stat HEAD | grep 'data/.*\.csv' | head -1 | awk '{print $1}')
          fi
          echo "CHANGED_CSV=$CHANGED" >> $GITHUB_ENV
          echo "Detected CSV: $CHANGED"

      - name: Process CSV and update dashboard
        run: python scripts/process_csv.py
        env:
          CHANGED_CSV: ${{ env.CHANGED_CSV }}

      - name: Commit updated dashboard
        run: |
          git config --global user.name 'LRC Dashboard Bot'
          git config --global user.email 'actions@github.com'
          git add index.html
          git add data/
          git diff --staged --quiet || git commit -m "Dashboard update: $(ls data/*.csv 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo 'new data')"
          git push
